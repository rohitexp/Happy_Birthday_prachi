<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You Prachi ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff4d6d; --dark: #1a1a1a; --gold: #ffd700; }
        body, html { margin: 0; padding: 0; background: #000; font-family: 'Poppins', sans-serif; color: white; overflow-x: hidden; }

        /* Timer/Lock Screen */
        #timer-screen {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, #2b0a1a 0%, #000 100%); text-align: center; padding: 20px;
        }
        .timer-display { font-size: 2.5rem; color: var(--pink); font-weight: bold; margin: 20px 0; }

        /* Magical Reveal Section */
        #reveal-screen { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .ribbon { width: 100%; height: 10px; background: linear-gradient(90deg, #880e4f, var(--pink), #880e4f); cursor: pointer; position: relative; z-index: 10; transition: 0.5s; }
        .tap-text { animation: pulse 1.5s infinite; color: var(--gold); margin-top: 20px; }

        /* Final Celebration Page */
        #final-page { display: none; background: #fff0f3; color: #333; min-height: 100vh; text-align: center; padding: 40px 20px; box-sizing: border-box; }
        h1 { font-family: 'Great Vibes', cursive; font-size: 4rem; color: var(--pink); margin: 0; opacity: 0; }
        
        .photo-frame { 
            width: 100%; max-width: 320px; border: 12px solid white; border-radius: 5px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: 30px auto; 
            transform: rotate(-3deg); transition: 0.5s; opacity: 0;
        }
        .photo-frame:nth-child(even) { transform: rotate(3deg); }
        .photo-frame img { width: 100%; display: block; }

        /* Typewriter Effect */
        #typewriter { font-size: 1.2rem; color: #555; margin: 20px auto; max-width: 500px; min-height: 50px; font-style: italic; }

        /* Floating Elements */
        .heart { position: fixed; top: -10%; animation: fall linear infinite; z-index: 100; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* Animations */
        .show-up { animation: fadeInUp 1s forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="birthday_song.mp3" type="audio/mpeg"></audio>

    <div id="timer-screen">
        <h2 style="font-family: 'Great Vibes'; font-size: 2.5rem; color: var(--gold);">Waiting for the Moment...</h2>
        <div class="timer-display" id="countdown">00:00:00:00</div>
    </div>

    <div id="reveal-screen" onclick="startCelebration()">
        <div class="ribbon" id="ribbon"></div>
        <p class="tap-text">Prachi, Tap to open your surprise ✨</p>
    </div>

    <div id="final-page">
        <h1 id="title">Happy Birthday Prachi!</h1>
        
        <div class="photo-frame" id="f1">
            <img src="photos1.jpg" onerror="this.src='https://via.placeholder.com/400x500?text=Photo+1'">
        </div>

        <div id="typewriter"></div>

        <div class="photo-frame" id="f2">
            <img src="photos2.jpg" onerror="this.src='https://via.placeholder.com/400x500?text=Photo+2'">
        </div>

        <div style="margin-top: 40px; border-top: 1px solid #ddd; padding-top: 20px; color: #888; font-size: 0.9rem;">
            Aashirwad: 16 April 💍<br>
            A beautiful journey has just begun...
        </div>
    </div>

    <script>
        const debugMode = true; // ABHI KE LIYE TRUE HAI
        const targetDate = new Date('April 25, 2026 00:00:00').getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0 || debugMode) {
                document.getElementById('timer-screen').style.display = 'none';
                document.getElementById('reveal-screen').style.display = 'flex';
            } else {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('countdown').innerHTML = `${d}d ${h}h ${m}m ${s}s`;
                setTimeout(updateTimer, 1000);
            }
        }
        updateTimer();

        function startCelebration() {
            document.getElementById('reveal-screen').style.display = 'none';
            const final = document.getElementById('final-page');
            final.style.display = 'block';
            
            // Music Play
            document.getElementById('bgMusic').play().catch(() => {});

            // Animations
            setTimeout(() => document.getElementById('title').classList.add('show-up'), 500);
            setTimeout(() => document.getElementById('f1').classList.add('show-up'), 1500);
            setTimeout(() => typeWriter(), 2500);
            setTimeout(() => document.getElementById('f2').classList.add('show-up'), 5000);

            startHearts();
        }

        const msg = "Wishing you a life full of laughter and joy. On your special day, I just want to say how lucky I feel to have you in my life. Happy Birthday! ❤️";
        let i = 0;
        function typeWriter() {
            if (i < msg.length) {
                document.getElementById("typewriter").innerHTML += msg.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['❤️','💖','✨','🌸'][Math.floor(Math.random()*4)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
